apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: conveniencia
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Construa apontando para os hosts do ingress (ver deploy/k8s/README.md):
          #   docker build -t conveniencia/frontend:1.0.0 \
          #     --build-arg VITE_CATALOGO_URL=http://catalogo.conveniencia.local \
          #     --build-arg VITE_VENDAS_URL=http://vendas.conveniencia.local ./frontend
          image: conveniencia/frontend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: conveniencia
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
