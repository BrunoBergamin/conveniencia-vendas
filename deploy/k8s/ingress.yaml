# Roteamento por host. Aponte os hosts para o IP do ingress no seu /etc/hosts, ex.:
#   127.0.0.1 app.conveniencia.local catalogo.conveniencia.local vendas.conveniencia.local
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: conveniencia-ingress
  namespace: conveniencia
spec:
  rules:
    - host: app.conveniencia.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: catalogo.conveniencia.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: catalogo-service
                port:
                  number: 8081
    - host: vendas.conveniencia.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vendas-service
                port:
                  number: 8082
