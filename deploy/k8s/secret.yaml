# Valores de exemplo para a demo. Em producao, gere segredos fortes e use um
# gerenciador (Sealed Secrets, External Secrets, Vault). NUNCA versione segredos reais.
apiVersion: v1
kind: Secret
metadata:
  name: conveniencia-secret
  namespace: conveniencia
type: Opaque
stringData:
  JWT_SECRET: troque-este-segredo-em-producao-com-32-bytes+
  CATALOGO_DB_PASSWORD: catalogo
  VENDAS_DB_PASSWORD: vendas
