quarkus.application.name=vendas-service
quarkus.http.port=${SERVER_PORT:8082}

# Banco (cada servico tem o seu)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:vendas}
quarkus.datasource.password=${DB_PASSWORD:vendas}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/vendas_db}

# Flyway e dono do schema; Hibernate apenas valida.
quarkus.hibernate-orm.database.generation=validate
quarkus.flyway.migrate-at-start=true

# Cliente REST para o catalogo-service (configKey "catalogo")
quarkus.rest-client.catalogo.url=${CATALOGO_URL:http://localhost:8081}

# JWT: mesmo segredo HS256 do catalogo-service (via Secret no Kubernetes)
jwt.secret=${JWT_SECRET:segredo-de-desenvolvimento-conveniencia-32b+}

# CORS para o frontend React (dev do Vite em 5173)
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type

# OpenAPI / Swagger em /q/openapi e /q/swagger-ui
quarkus.smallrye-openapi.info-title=vendas-service
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.swagger-ui.always-include=true
