# Configuracao dos TESTES (mescla com a application.properties principal).
# A URL do banco e %prod/%dev na config principal, entao aqui nos testes ela
# fica ausente e o Dev Services do Quarkus sobe um PostgreSQL descartavel em
# container (precisa de Docker), aplicando o Flyway nele.

# O job de reconciliacao nao roda nos testes (ele e testado em unidade).
quarkus.scheduler.enabled=false
